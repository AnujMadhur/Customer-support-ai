name: CI - Test on Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check imports work
        run: |
          cd backend
          python -c "import fastapi, sqlalchemy, pandas, google.generativeai; print('All imports OK ✅')"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install and build
        run: |
          cd frontend
          npm install
          npm run build
          echo "Frontend builds OK ✅"